<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>客服组件测试</title>
</head>
<body>
<h1>测试页面</h1>
<p>检查右下角是否有"💬 在线客服"按钮</p>

<!-- 不用 async，直接加载 -->
<script src="https://pro5brian-byte.github.io/ai-chat-service/chat-widget.js?v=40"></script>
<style>
#ai-chat-btn { font-size: 0 !important; width: auto !important; padding: 12px 24px !important; border-radius: 24px !important; }
#ai-chat-btn::before { content: "💬 在线客服"; font-size: 14px; }
</style>

<script>
setTimeout(function() {
    var btn = document.getElementById('ai-chat-btn');
    var result = document.getElementById('result');
    if (btn) {
        result.innerHTML = '<p style="color:green;font-size:20px;">✅ 按钮正常显示！</p>';
    } else {
        result.innerHTML = '<p style="color:red;font-size:20px;">❌ 按钮未创建</p>';
    }
}, 3000);
</script>

<div id="result" style="margin-top:20px;">检测中...</div>
</body>
</html>
