<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>客服组件测试</title>
</head>
<body>
<h1>测试页面 - v40</h1>
<p>检查右下角是否有"💬 在线客服"按钮</p>

<script src="https://pro5brian-byte.github.io/ai-chat-service/chat-widget.js?v=40" async></script>
<style>
#ai-chat-btn { font-size: 0 !important; width: auto !important; padding: 12px 24px !important; border-radius: 24px !important; }
#ai-chat-btn::before { content: "💬 在线客服"; font-size: 14px; }
</style>

<script>
setTimeout(function() {
    var btn = document.getElementById('ai-chat-btn');
    if (btn) {
        document.body.innerHTML += '<p style="color:green;font-size:20px;">✅ 按钮正常！</p>';
    } else {
        document.body.innerHTML += '<p style="color:red;font-size:20px;">❌ 按钮未创建</p>';
    }
}, 2000);
</script>
</body>
</html>
